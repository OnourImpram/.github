name: Documentation improvement
description: Improve clarity, examples, installation, or conceptual framing.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: textarea
    id: page
    attributes:
      label: Page or section
      description: Link or name the relevant file.
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is unclear?
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed improvement

